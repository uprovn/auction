document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gày)', mode: 'numeric' },\n          { k: 'p2_auctiondate', label: 'Ngày tổ chức đấu giá' } ] },\n        { sec: 'Liên hệ', fields: [\n          { k: 'p2_hotline', label: 'Hotline', mode: 'tel' },\n          { k: 'p2_viewat', label: 'Bãi xe / địa điểm xem' },\n          { k: 'p2_org', label: 'Tổ chức đấu giá' } ] },\n        { sec: 'Hình ảnh', fields: [\n          { k: 'p2_logo', label: 'Logo ngân hàng', type: 'image' },\n          { k: 'p2_img', label: 'Ảnh xe', type: 'image' },\n          { k: 'p2_qr', label: 'Mã QR hồ sơ', type: 'image' } ] }\n      ],\n      p3: [\n        { sec: 'Ngân hàng', fields: [ { k: 'p3_bank', label: 'Tên ngân hàng' } ] },\n        { sec: 'Tổng quan lô', fields: [\n          { k: 'p3_lot', label: 'Lô số' },\n          { k: 'p3_price', label: 'Giá khởi điểm trọn cụm' },\n          { k: 'p3_market', label: 'Giá thị trường tham khảo' },\n          { k: 'p3_deposit', label: 'Tiền cọc' } ] },\n        { sec: 'A · Nhà xưởng / mặt bằng', fields: [\n          { k: 'p3_land', label: 'Diện tích đất' },\n          { k: 'p3_wsarea', label: 'DT xưởng / kho' },\n          { k: 'p3_wsloc', label: 'Vị trí (KCN / địa chỉ)', multiline: true },\n          { k: 'p3_wsyear', label: 'Năm XD / kết cấu' },\n          { k: 'p3_wslegal', label: 'Pháp lý (sổ / thuê)' },\n          { k: 'p3_wsprice', label: 'Giá KĐ nhà xưởng (lẻ)' } ] },\n        { sec: 'B · Máy 1', fields: [\n          { k: 'p3_n1', label: 'Tên máy / thiết bị' },\n          { k: 'p3_y1', label: 'Năm SX', mode: 'numeric' },\n          { k: 'p3_p1', label: 'Công suất' },\n          { k: 'p3_s1', label: 'Tình trạng' },\n          { k: 'p3_g1', label: 'Giá KĐ (lẻ)' } ] },\n        { sec: 'B · Máy 2', fields: [\n          { k: 'p3_n2', label: 'Tên máy / thiết bị' },\n          { k: 'p3_y2', label: 'Năm SX', mode: 'numeric' },\n          { k: 'p3_p2', label: 'Công suất' },\n          { k: 'p3_s2', label: 'Tình trạng' },\n          { k: 'p3_g2', label: 'Giá KĐ (lẻ)' } ] },\n        { sec: 'B · Máy 3', fields: [\n          { k: 'p3_n3', label: 'Tên máy / thiết bị' },\n          { k: 'p3_y3', label: 'Năm SX', mode: 'numeric' },\n          { k: 'p3_p3', label: 'Công suất' },\n          { k: 'p3_s3', label: 'Tình trạng' },\n          { k: 'p3_g3', label: 'Giá KĐ (lẻ)' } ] },\n        { sec: 'B · Máy 4', fields: [\n          { k: 'p3_n4', label: 'Tên máy / thiết bị' },\n          { k: 'p3_y4', label: 'Năm SX', mode: 'numeric' },\n          { k: 'p3_p4', label: 'Công suất' },\n          { k: 'p3_s4', label: 'Tình trạng' },\n          { k: 'p3_g4', label: 'Giá KĐ (lẻ)' } ] },\n        { sec: 'Khác', fields: [\n          { k: 'p3_more', label: 'Số máy/thiết bị khác', mode: 'numeric' } ] },\n        { sec: 'Thời hạn', fields: [\n          { k: 'p3_deadline', label: 'Hạn nộp hồ sơ' },\n          { k: 'p3_days', label: 'Chỉ còn (số ngày)', mode: 'numeric' } ] },\n        { sec: 'Liên hệ', fields: [\n          { k: 'p3_hotline', label: 'Hotline', mode: 'tel' },\n          { k: 'p3_viewat', label: 'Kho / xưởng xem máy' },\n          { k: 'p3_org', label: 'Tổ chức đấu giá' } ] },\n        { sec: 'Hình ảnh', fields: [\n          { k: 'p3_logo', label: 'Logo ngân hàng', type: 'image' },\n          { k: 'p3_qr', label: 'Mã QR hồ sơ', type: 'image' } ] }\n      ]\n    };\n\n    // ---------- init posters (cache defaults + apply saved) ----------\n    document.querySelectorAll('[data-k]').forEach((el) => {\n      if (el.dataset.def == null) el.dataset.def = el.textContent;\n      const k = el.getAttribute('data-k');\n      el.textContent = (data[k] != null && data[k] !== '') ? data[k] : el.dataset.def;\n    });\n\n    const applyImg = (el, url) => {\n      if (!el) return;\n      el.style.backgroundImage = 'url(\"' + url + '\")';\n      el.style.backgroundSize = 'cover';\n      el.style.backgroundPosition = 'center';\n      el.querySelectorAll('.imglabel').forEach((l) => { l.style.display = 'none'; });\n    };\n    document.querySelectorAll('[data-img]').forEach((el) => {\n      const k = el.getAttribute('data-img');\n      if (data[k]) applyImg(el, data[k]);\n      // tap on the preview slot also opens the picker\n      el.style.cursor = 'pointer';\n      el.addEventListener('click', () => pickImage(k));\n    });\n\n    // ---------- field / image helpers ----------\n    const setField = (k, val) => {\n      data[k] = val; save();\n      const span = document.querySelector('[data-k=\"' + k + '\"]');\n      if (span) span.textContent = (val && val.length) ? val : span.dataset.def;\n    };\n\n    const loadImage = (k, file) => {\n      if (!file || !/^image\\//.test(file.type)) return;\n      const r = new FileReader();\n      r.onload = () => {\n        data[k] = r.result; save();\n        applyImg(document.querySelector('[data-img=\"' + k + '\"]'), r.result);\n        buildForm(active); // refresh thumbnails\n      };\n      r.readAsDataURL(file);\n    };\n    const pickImage = (k) => {\n      const inp = document.createElement('input');\n      inp.type = 'file'; inp.accept = 'image/*';\n      inp.addEventListener('change', (e) => loadImage(k, e.target.files[0]));\n      inp.click();\n    };\n\n    // ---------- styles ----------\n    const S = {\n      section: 'background:#fff;border:1px solid #e2dccd;border-radius:14px;padding:14px 14px 4px;margin:12px 0;',\n      title: 'font-size:12px;font-weight:800;letter-spacing:.11em;text-transform:uppercase;color:#b78e33;margin:0 0 11px;',\n      field: 'margin-bottom:12px;',\n      label: 'display:block;font-size:13px;font-weight:600;color:#3c4a5c;margin-bottom:5px;',\n      input: 'width:100%;font-size:16px;padding:11px 12px;border:1px solid #d3ccbb;border-radius:10px;background:#fbf9f4;color:#10243b;',\n      row: 'display:flex;align-items:center;gap:12px;',\n      thumb: 'width:56px;height:56px;border:1px solid #d3ccbb;border-radius:10px;background-color:#fbf9f4;background-size:cover;background-position:center;background-repeat:no-repeat;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:#c3b58f;overflow:hidden;',\n      choose: 'font-size:14px;font-weight:700;padding:10px 18px;border-radius:10px;border:1px solid #10243b;background:#fff;color:#10243b;cursor:pointer;'\n    };\n    const mk = (tag, css, txt) => { const e = document.createElement(tag); if (css) e.style.cssText = css; if (txt != null) e.textContent = txt; return e; };\n\n    const buildForm = (pid) => {\n      const host = document.getElementById('formHost');\n      if (!host) return;\n      host.innerHTML = '';\n      FORMS[pid].forEach((sec) => {\n        const box = mk('div', S.section);\n        box.appendChild(mk('h3', S.title, sec.sec));\n        sec.fields.forEach((f) => {\n          const w = mk('div', S.field);\n          w.appendChild(mk('label', S.label, f.label));\n          if (f.type === 'image') {\n            const row = mk('div', S.row);\n            const thumb = mk('div', S.thumb);\n            if (data[f.k]) { thumb.style.backgroundImage = 'url(\"' + data[f.k] + '\")'; }\n            else { thumb.textContent = '🖼'; }\n            const btn = mk('button', S.choose, data[f.k] ? 'Đổi ảnh' : 'Chọn ảnh');\n            btn.type = 'button';\n            btn.addEventListener('click', () => pickImage(f.k));\n            row.appendChild(thumb); row.appendChild(btn);\n            w.appendChild(row);\n          } else {\n            const inp = f.multiline ? mk('textarea', S.input + 'min-height:62px;resize:vertical;line-height:1.4;') : mk('input', S.input);\n            if (!f.multiline) inp.type = 'text';\n            const span = document.querySelector('[data-k=\"' + f.k + '\"]');\n            inp.placeholder = (span && span.getAttribute('data-ph')) || f.label;\n            inp.value = data[f.k] != null ? data[f.k] : '';\n            if (f.mode) inp.setAttribute('inputmode', f.mode);\n            inp.addEventListener('input', () => { setField(f.k, inp.value); requestAnimationFrame(fit); });\n            inp.addEventListener('focus', () => { inp.style.borderColor = '#10243b'; inp.style.background = '#fff'; });\n            inp.addEventListener('blur', () => { inp.style.borderColor = '#d3ccbb'; inp.style.background = '#fbf9f4'; });\n            w.appendChild(inp);\n          }\n          box.appendChild(w);\n        });\n        host.appendChild(box);\n      });\n    };\n\n    // ---------- preview scaling ----------\n    const fit = () => {\n      const zone = document.querySelector('.previewzone');\n      const stage = document.querySelector('.stage');\n      const inner = document.querySelector('.stageInner');\n      if (!zone || !stage || !inner) return;\n      const avail = Math.max(240, zone.clientWidth - 28);\n      const s = Math.min(avail / 1080, 0.62);\n      stage.style.width = (1080 * s) + 'px';\n      stage.style.height = (1350 * s) + 'px';\n      inner.style.transform = 'scale(' + s + ')';\n    };\n    window.addEventListener('resize', fit);\n\n    // ---------- tabs ----------\n    const styleTab = (t, on) => {\n      t.style.background = on ? '#c8a24a' : 'transparent';\n      t.style.color = on ? '#10243b' : '#cdbb95';\n      t.style.boxShadow = on ? 'inset 0 0 0 1px #c8a24a' : 'inset 0 0 0 1px rgba(205,187,149,.35)';\n    };\n    let active = data.__tab || 'p1';\n    if (!FORMS[active]) active = 'p1';\n\n    const setTab = (pid) => {\n      active = pid; data.__tab = pid; save();\n      ['p1', 'p2', 'p3'].forEach((id) => {\n        const el = document.getElementById(id);\n        if (el) el.style.display = (id === pid) ? 'flex' : 'none';\n      });\n      document.querySelectorAll('[data-tab]').forEach((t) => styleTab(t, t.getAttribute('data-tab') === pid));\n      document.body.setAttribute('data-printonly', pid);\n      buildForm(pid);\n      requestAnimationFrame(fit);\n    };\n    document.querySelectorAll('[data-tab]').forEach((t) => {\n      t.addEventListener('click', () => setTab(t.getAttribute('data-tab')));\n    });\n\n    // ---------- bottom actions ----------\n    const exportPng = async (btn) => {\n      const el = document.getElementById(active);\n      if (!el || !window.htmlToImage) { window.alert('Chưa tải được bộ tạo ảnh, thử lại sau vài giây.'); return; }\n      const label = btn.textContent;\n      btn.disabled = true; btn.style.opacity = '.6'; btn.textContent = 'Đang tạo ảnh…';\n      if (document.activeElement && document.activeElement.blur) document.activeElement.blur();\n      try {\n        const dataUrl = await window.htmlToImage.toPng(el, { width: 1080, height: 1350, pixelRatio: 2, cacheBust: true, backgroundColor: null });\n        const a = document.createElement('a');\n        a.href = dataUrl; a.download = 'poster_' + active + '.png';\n        document.body.appendChild(a); a.click(); a.remove();\n      } catch (err) { window.alert('Không tạo được ảnh: ' + err); }\n      btn.disabled = false; btn.style.opacity = '1'; btn.textContent = label;\n    };\n    document.querySelectorAll('[data-act]').forEach((btn) => {\n      const act = btn.getAttribute('data-act');\n      btn.addEventListener('click', () => {\n        if (act === 'png') exportPng(btn);\n        else if (act === 'pdf') { document.body.setAttribute('data-printonly', active); window.print(); }\n        else if (act === 'reset') {\n          if (window.confirm('Xoá toàn bộ nội dung đã điền và ảnh của poster hiện tại?')) {\n            FORMS[active].forEach((sec) => sec.fields.forEach((f) => { delete data[f.k]; }));\n            save();\n            document.querySelectorAll('#' + active + ' [data-k]').forEach((el) => { el.textContent = el.dataset.def; });\n            document.querySelectorAll('#' + active + ' [data-img]').forEach((el) => {\n              el.style.backgroundImage = 'none';\n              el.querySelectorAll('.imglabel').forEach((l) => { l.style.display = ''; });\n            });\n            buildForm(active); requestAnimationFrame(fit);\n          }\n        }\n      });\n    });\n\n    // ---------- go ----------\n    setTab(active);\n    fit();\n    setTimeout(fit, 300);\n    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
